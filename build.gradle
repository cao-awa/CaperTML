plugins {
    id 'org.jetbrains.kotlin.jvm' version '2.2.21'
}

group = "$project.group_id"
version = "$project.version_name"

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.jetbrains.kotlin:kotlin-test'

    implementation 'org.jetbrains:annotations:26.1.0'
}

kotlin {
    jvmToolchain(24)
}

test {
    useJUnitPlatform()
}